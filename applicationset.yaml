apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: k8s-test
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: git@github.com:leonlaf66/k8s-test.git
      revision: HEAD
      files:
      - path: "components/**/app-config.yaml"

  template:
    metadata:
      name: '{{appName}}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{syncWave}}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: git@github.com:leonlaf66/k8s-test.git
        targetRevision: HEAD
        path: '{{path}}'
        helm:
          valueFiles:
          - values.yaml
          - values/{{env}}.yaml
          ignoreMissingValueFiles: true
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        retry:
          limit: 3
          backoff:
            duration: 10s
            factor: 2