apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-connect-config
  namespace: kafka-connect
data:
  # Kafka Connect Worker 配置
  connect-distributed.properties: |
    # Bootstrap servers - 替换为实际的 Kafka/MSK endpoint
    bootstrap.servers=kafka-bootstrap:9092
    
    # Connect cluster group id
    group.id=kafka-connect-cluster
    
    # 存储 connector 和 task 配置的 topics
    config.storage.topic=connect-configs
    config.storage.replication.factor=1
    
    # 存储 offset 的 topic
    offset.storage.topic=connect-offsets
    offset.storage.replication.factor=1
    offset.storage.partitions=25
    
    # 存储 status 的 topic
    status.storage.topic=connect-status
    status.storage.replication.factor=1
    status.storage.partitions=5
    
    # Converters
    key.converter=org.apache.kafka.connect.json.JsonConverter
    value.converter=org.apache.kafka.connect.json.JsonConverter
    key.converter.schemas.enable=false
    value.converter.schemas.enable=false
    
    # REST API
    rest.advertised.host.name=kafka-connect
    rest.port=8083
    
    # Plugin path
    plugin.path=/usr/share/java,/usr/share/confluent-hub-components

  # S3 Sink Connector 配置示例
  s3-sink-connector.json: |
    {
      "name": "s3-sink-example",
      "config": {
        "connector.class": "io.confluent.connect.s3.S3SinkConnector",
        "tasks.max": "1",
        "topics": "example-topic",
        "s3.bucket.name": "my-data-lake-bucket",
        "s3.region": "us-east-1",
        "storage.class": "io.confluent.connect.s3.storage.S3Storage",
        "format.class": "io.confluent.connect.s3.format.json.JsonFormat",
        "partitioner.class": "io.confluent.connect.storage.partitioner.TimeBasedPartitioner",
        "path.format": "'year'=YYYY/'month'=MM/'day'=dd/'hour'=HH",
        "partition.duration.ms": "3600000",
        "locale": "en-US",
        "timezone": "UTC",
        "timestamp.extractor": "Record",
        "flush.size": "1000",
        "rotate.interval.ms": "60000",
        "key.converter": "org.apache.kafka.connect.json.JsonConverter",
        "key.converter.schemas.enable": "false",
        "value.converter": "org.apache.kafka.connect.json.JsonConverter",
        "value.converter.schemas.enable": "false"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-connect
  namespace: kafka-connect
  labels:
    app: kafka-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-connect
  template:
    metadata:
      labels:
        app: kafka-connect
    spec:
      containers:
      - name: kafka-connect
        # Confluent Kafka Connect with S3 Sink plugin pre-installed
        image: confluentinc/cp-kafka-connect:7.5.0
        ports:
        - containerPort: 8083
          name: rest-api
        env:
        - name: CONNECT_BOOTSTRAP_SERVERS
          value: "kafka-bootstrap:9092"
        - name: CONNECT_REST_PORT
          value: "8083"
        - name: CONNECT_GROUP_ID
          value: "kafka-connect-cluster"
        - name: CONNECT_CONFIG_STORAGE_TOPIC
          value: "connect-configs"
        - name: CONNECT_OFFSET_STORAGE_TOPIC
          value: "connect-offsets"
        - name: CONNECT_STATUS_STORAGE_TOPIC
          value: "connect-status"
        - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
          value: "1"
        - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
          value: "1"
        - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
          value: "1"
        - name: CONNECT_KEY_CONVERTER
          value: "org.apache.kafka.connect.json.JsonConverter"
        - name: CONNECT_VALUE_CONVERTER
          value: "org.apache.kafka.connect.json.JsonConverter"
        - name: CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE
          value: "false"
        - name: CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE
          value: "false"
        - name: CONNECT_REST_ADVERTISED_HOST_NAME
          value: "kafka-connect"
        - name: CONNECT_PLUGIN_PATH
          value: "/usr/share/java,/usr/share/confluent-hub-components"
        # AWS credentials (从 Secret 获取)
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: access-key-id
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: secret-access-key
              optional: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /connectors
            port: 8083
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /connectors
            port: 8083
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /etc/kafka-connect
      volumes:
      - name: config
        configMap:
          name: kafka-connect-config
