apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-k8s
  namespace: nodejs
  labels:
    app: nodejs-k8s
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-k8s
  template:
    metadata:
      labels:
        app: nodejs-k8s
    spec:
      containers:
      - name: nodejs-app
        image: leonlaf/nodejs-k8s:8472430
        ports:
        - containerPort: 3000
          name: http
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"