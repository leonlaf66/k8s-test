apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    # ── Tail all container logs from nodes ──────────────────────────────────
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        # Exclude fluent-bit's own logs to avoid circular logging
        Exclude_Path      /var/log/containers/fluent-bit*
        Parser            cri
        DB                /var/fluent-bit/pos/flb_kube.db
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    # ── Kubernetes metadata enrichment ──────────────────────────────────────
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_processed
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Annotations         Off
        Labels              On

    # ── Dedot kubernetes label keys (replace . with _ for ES compat) ─────────
    # (Uncomment if forwarding to Elasticsearch)
    # [FILTER]
    #     Name    modify
    #     Match   kube.*
    #     ...

    # ── Only keep logs from our app namespaces (optional filter) ────────────
    # Remove the grep filter below to collect ALL namespaces
    [FILTER]
        Name   grep
        Match  kube.*
        Regex  $kubernetes['namespace_name'] ^(nodejs|monitoring|argocd|nginx-space|argo)$

    # ── Output: stdout (great for local testing, view via kubectl logs) ──────
    [OUTPUT]
        Name            stdout
        Match           kube.*
        Format          json_lines

    # ── Output: Forward to aggregator (uncomment for production) ─────────────
    # [OUTPUT]
    #     Name          forward
    #     Match         kube.*
    #     Host          log-aggregator.logging.svc.cluster.local
    #     Port          24224

    # ── Output: Loki (uncomment if you deploy Loki) ──────────────────────────
    # [OUTPUT]
    #     Name            loki
    #     Match           kube.*
    #     Host            loki.logging.svc.cluster.local
    #     Port            3100
    #     Labels          job=fluentbit, namespace=$kubernetes['namespace_name'], pod=$kubernetes['pod_name']
    #     Auto_Kubernetes_Labels On

  parsers.conf: |
    # CRI (containerd) log format - used by kubeadm clusters
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

    # Docker log format (for older Docker-based setups)
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

    # JSON parser for structured app logs
    [PARSER]
        Name        json
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ
