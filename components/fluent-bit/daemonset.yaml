apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging
  labels:
    app: fluent-bit
    version: v3
spec:
  selector:
    matchLabels:
      app: fluent-bit
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: fluent-bit
        version: v3
      annotations:
        # Don't let Fluent Bit collect its own logs (matched by Exclude_Path in config)
        fluentbit.io/exclude: "true"
    spec:
      serviceAccountName: fluent-bit
      tolerations:
      # Run on master/control-plane nodes too
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      containers:
      - name: fluent-bit
        securityContext:
          runAsUser: 0
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        image: fluent/fluent-bit:3.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 2020
          name: http-metrics
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: 2020
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 2020
          initialDelaySeconds: 5
          periodSeconds: 15
        resources:
          requests:
            memory: "50Mi"
            cpu: "50m"
          limits:
            memory: "200Mi"
            cpu: "200m"
        volumeMounts:
        # Container log files on the node
        - name: varlog
          mountPath: /var/log
          readOnly: true
        # Docker/containerd container filesystem (for log rotation tracking)
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        # Fluent Bit config from ConfigMap
        - name: config
          mountPath: /fluent-bit/etc/
        # Position DB (tracks read position across restarts)
        - name: positions
          mountPath: /var/log/
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: config
        configMap:
          name: fluent-bit-config
      - name: positions
        hostPath:
          path: /var/log/fluent-bit-pos
          type: DirectoryOrCreate
---
# Service for Fluent Bit metrics (Prometheus scraping)
apiVersion: v1
kind: Service
metadata:
  name: fluent-bit
  namespace: logging
  labels:
    app: fluent-bit
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "2020"
    prometheus.io/path: "/api/v1/metrics/prometheus"
spec:
  selector:
    app: fluent-bit
  ports:
  - port: 2020
    targetPort: 2020
    name: http-metrics
  clusterIP: None   # Headless - scrape each pod individually
