apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-adapter-config
  namespace: monitoring
data:
  config.yaml: |
    # Prometheus Adapter rules configuration
    # Maps Prometheus metrics → Kubernetes Custom Metrics API
    rules:
    # ── QPS metric for HPA ────────────────────────────────────────────────────
    # Exposes: custom.metrics.k8s.io/v1beta1/namespaces/nodejs/pods/*/http_requests_per_second
    - seriesQuery: 'http_requests_total{namespace!="",pod!=""}'
      resources:
        overrides:
          kubernetes_namespace:
            resource: namespace
          kubernetes_pod_name:
            resource: pod
      name:
        matches: "^http_requests_total$"
        as: "http_requests_per_second"
      # rate() over 2-minute window gives requests/second
      metricsQuery: 'rate(http_requests_total{<<.LabelMatchers>>, route!="/health"}[2m])'

    # ── Request duration p95 ───────────────────────────────────
    - seriesQuery: 'http_request_duration_seconds_bucket{namespace!="",pod!=""}'
      resources:
        overrides:
          kubernetes_namespace:
            resource: namespace
          kubernetes_pod_name:
            resource: pod
      name:
        matches: "^http_request_duration_seconds_bucket$"
        as: "http_request_duration_p95"
      metricsQuery: 'histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{<<.LabelMatchers>>}[5m]))'
