apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: build-docker-image
  namespace: argo
spec:
  serviceAccountName: argo-workflow
  entrypoint: build-and-push

  arguments:
    parameters:
    - name: repo-url
      value: "https://github.com/leonlaf66/nodejs-k8s.git"
    - name: branch
      value: "main"
    - name: image-name
      value: "leonlaf/nodejs-k8s"
    - name: dockerfile-path
      value: "."
    - name: gitops-repo-url
      value: "git@github.com:leonlaf66/k8s-test.git"
    - name: gitops-values-path
      value: "components/nodejs-k8s/values/{{ .Values.env }}.yaml"
    - name: pr-branch
      value: "main"
    - name: pr-number
      value: "0"

  volumeClaimTemplates:
  - metadata:
      name: workdir
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi

  volumes:
  - name: git-ssh-key
    secret:
      secretName: git-ssh-secret
      defaultMode: 0400

  templates:
  - name: build-and-push
    steps:
    - - name: clone-repo
        template: git-clone

    - - name: build-image
        template: docker-build
        arguments:
          parameters:
          - name: image-tag
            value: "{{`{{steps.clone-repo.outputs.parameters.generated-tag}}`}}"

    - - name: update-gitops
        template: update-gitops-repo
        arguments:
          parameters:
          - name: new-image-tag
            value: "{{`{{steps.clone-repo.outputs.parameters.generated-tag}}`}}"

  - name: git-clone
    container:
      image: alpine/git:latest
      command: [sh, -c]
      args:
      - |
        set -ex
        git clone {{`{{workflow.parameters.repo-url}}`}} /work/repo
        cd /work/repo
        git checkout {{`{{workflow.parameters.branch}}`}}
        git rev-parse --short HEAD > /work/git-sha.txt
        cat /work/git-sha.txt
      volumeMounts:
      - name: workdir
        mountPath: /work
    outputs:
      parameters:
      - name: generated-tag
        valueFrom:
          path: /work/git-sha.txt

  - name: docker-build
    inputs:
      parameters:
      - name: image-tag
    container:
      image: gcr.io/kaniko-project/executor:latest
      command: [/kaniko/executor]
      args:
      - --context=/work/repo/{{`{{workflow.parameters.dockerfile-path}}`}}
      - --dockerfile=/work/repo/{{`{{workflow.parameters.dockerfile-path}}`}}/Dockerfile
      - --destination={{`{{workflow.parameters.image-name}}`}}:{{`{{inputs.parameters.image-tag}}`}}
      - --cache=true
      - --cache-ttl=24h
      volumeMounts:
      - name: workdir
        mountPath: /work
      - name: docker-config
        mountPath: /kaniko/.docker/
    volumes:
    - name: docker-config
      secret:
        secretName: docker-registry-secret
        items:
        - key: .dockerconfigjson
          path: config.json

  - name: update-gitops-repo
    inputs:
      parameters:
      - name: new-image-tag
    container:
      image: alpine/git:latest
      command: [sh, -c]
      args:
      - |
        set -ex
        apk add --no-cache curl

        mkdir -p ~/.ssh
        cp /etc/git-ssh/id_rsa ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan github.com >> ~/.ssh/known_hosts

        git config --global user.email "argo-workflow-bot@leon.com"
        git config --global user.name "Argo Workflow Bot"

        git clone {{`{{workflow.parameters.gitops-repo-url}}`}} /work/gitops-repo
        cd /work/gitops-repo

        NEW_TAG="{{`{{inputs.parameters.new-image-tag}}`}}"
        PR_NUMBER="{{`{{workflow.parameters.pr-number}}`}}"
        PR_BRANCH="{{`{{workflow.parameters.pr-branch}}`}}"

        # 创建新 branch
        GITOPS_BRANCH="update/nodejs-k8s-pr-${PR_NUMBER}-${NEW_TAG}"
        git checkout -b "$GITOPS_BRANCH"

        FILE_PATH="{{`{{workflow.parameters.gitops-values-path}}`}}"
        sed -i "s|tag:.*|tag: ${NEW_TAG}|g" "$FILE_PATH"

        echo "Changes:"
        git diff "$FILE_PATH"

        git add "$FILE_PATH"
        git commit -m "feat(nodejs-k8s): update image tag to ${NEW_TAG} for PR #${PR_NUMBER} [skip ci]"
        git push origin "$GITOPS_BRANCH"

        # 调用 GitHub API 创建 PR
        curl -s -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/leonlaf66/k8s-test/pulls \
          -d "{
            \"title\": \"feat(nodejs-k8s): update image tag to ${NEW_TAG}\",
            \"body\": \"Automated PR\\n\\nSource: nodejs-k8s PR #${PR_NUMBER} (branch: ${PR_BRANCH})\\nImage tag: ${NEW_TAG}\",
            \"head\": \"${GITOPS_BRANCH}\",
            \"base\": \"main\"
          }"

        echo "GitOps PR created."
      env:
      - name: GITHUB_TOKEN
        valueFrom:
          secretKeyRef:
            name: github-token
            key: token
      volumeMounts:
      - name: git-ssh-key
        mountPath: /etc/git-ssh
      - name: workdir
        mountPath: /work