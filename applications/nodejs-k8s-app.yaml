apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nodejs-k8s
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: 'git@github.com:leonlaf66/k8s-test.git'
    targetRevision: HEAD
    path: components/nodejs-k8s
  
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: nodejs
  
  syncPolicy:
    syncOptions:
      - CreateNamespace=true